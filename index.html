<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    p {
      font-size: 1.1rem;
      color: #cbd5e1;
      line-height: 1.6;
    }

    .tagline {
      margin-top: 15px;
      font-size: 0.95rem;
      color: #94a3b8;
    }

    .email-box {
      margin-top: 25px;
    }

    input[type="email"] {
      padding: 12px;
      width: 70%;
      border: none;
      border-radius: 6px;
      outline: none;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      color: #0f172a;
      cursor: pointer;
      font-weight: bold;
      margin-left: 5px;
    }

    button:hover {
      background: #0ea5e9;
    }

    .footer {
      margin-top: 40px;
      font-size: 0.8rem;
      color: #64748b;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Coming Soon</h1>

    <p>
      We're building something simple, fast, and useful.  
      Stay tuned—launching soon.
    </p>

    <div class="tagline">
      A better experience is on the way.
    </div>

    <!-- Optional email capture (static demo only) -->
    <div class="email-box">
      <input type="email" placeholder="Enter your email" />
      <button onclick="alert('Thanks! (This is just a demo)')">Notify Me</button>
    </div>

    <div class="footer">
      © Your Brand • Built with GitHub Pages
    </div>
  </div>
</body>
</html>
