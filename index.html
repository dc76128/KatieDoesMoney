<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 650px;
      width: 100%;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5e1;
      line-height: 1.6;
    }

    /* FACT CAROUSEL */
    .fact-box {
      margin-top: 25px;
      padding: 20px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.05rem;
    }

    .fact-controls {
      margin-top: 10px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      color: #0f172a;
      cursor: pointer;
      font-weight: bold;
      margin: 5px;
    }

    button:hover {
      background: #0ea5e9;
    }

    /* SOCIAL LINKS */
    .social {
      margin-top: 30px;
    }

    .social a {
      display: inline-block;
      margin: 10px;
      padding: 12px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      color: white;
    }

    .ig {
      background: #E1306C;
    }

    .fb {
      background: #1877F2;
    }

    .tagline {
      margin-top: 15px;
      color: #94a3b8;
    }

    .footer {
      margin-top: 35px;
      font-size: 0.8rem;
      color: #64748b;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Coming Soon</h1>

    <p>
      We're building something simple, fast, and useful.  
      Stay tuned—launching soon.
    </p>

    <div class="tagline">
      A better financial experience is on the way.
    </div>

    <!-- FINANCE FACT CAROUSEL -->
    <div class="fact-box" id="factBox">
      Loading finance fact...
    </div>

    <div class="fact-controls">
      <button onclick="prevFact()">← Prev</button>
      <button onclick="nextFact()">Next →</button>
    </div>

    <!-- SOCIAL LINKS -->
    <div class="social">
      <a class="ig" href="#" target="_blank">Instagram</a>
      <a class="fb" href="#" target="_blank">Facebook</a>
    </div>

    <div class="footer">
      © Your Brand • Built with GitHub Pages
    </div>
  </div>

  <script>
    const facts = [
      "The average American has about $90,000 in debt.",
      "Compounding interest is often called the 8th wonder of the world.",
      "Most millionaires build wealth through consistent investing, not high income alone.",
      "A $5 daily habit can grow to over $180,000 in 30 years at 8% returns.",
      "Credit scores were introduced in the 1980s.",
      "Diversification reduces risk but doesn't eliminate it.",
      "Inflation reduces the purchasing power of money over time."
    ];

    let index = 0;
    const box = document.getElementById("factBox");

    function showFact() {
      box.textContent = facts[index];
    }

    function nextFact() {
      index = (index + 1) % facts.length;
      showFact();
    }

    function prevFact() {
      index = (index - 1 + facts.length) % facts.length;
      showFact();
    }

    // auto-load first fact
    showFact();

    // optional auto-rotate every 8 seconds
    setInterval(nextFact, 8000);
  </script>
</body>
</html>
